services:
  - type: web
    name: whatsapp-business-backend
    env: node
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: PORT
        value: 10000
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        description: MongoDB connection string (get this from MongoDB Atlas)
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_BACKEND_URL
        description: Public HTTPS URL for this backend (for OAuth callbacks and public consent links)
      - key: FRONTEND_URL
        description: Frontend app URL
      - key: META_APP_ID
        description: Meta app ID used for Meta Ads / lead sync
      - key: META_APP_SECRET
        description: Meta app secret used for Meta Ads / lead sync
      - key: META_API_VERSION
        value: v22.0
      - key: META_TOKEN_ENCRYPTION_KEY
        description: 32+ character encryption key for stored Meta tokens
      - key: WHATSAPP_OPTIN_PUBLIC_KEY
        description: Shared public key used by website / landing page opt-in forms
      - key: ADMIN_INTERNAL_API_KEY
        description: Shared secret used by the broadcast backend to resolve admin user credentials.
      - key: ADMIN_BACKEND_URL
        description: Admin backend base URL used for credential lookups.
      - key: ADMIN_API_BASE_URL
        description: Alternate admin backend base URL used for credential lookups.
      - key: WHATSAPP_BACKEND_INTERNAL_API_KEY
        description: Shared secret for IVR backend calls to /internal/ivr/notify. Must match the voice backend WHATSAPP_BACKEND_INTERNAL_API_KEY.
    plan: free
    autoDeploy: true
